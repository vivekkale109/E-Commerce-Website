<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Lumen Market</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
   <body>
    <div data-nav></div>
    <main class="container section">
      <h2>Admin Dashboard</h2>
      <div class="cart-layout">
        <div>
          <h3>Product form</h3>
          <form class="form" data-admin-form>
            <input class="input" name="name" placeholder="Product name" required />
            <textarea class="input" name="description" placeholder="Description" required></textarea>
            <div class="form-row">
              <input class="input" name="price" type="number" step="0.01" placeholder="Price" required />
              <input class="input" name="stock" type="number" placeholder="Stock" />
            </div>
            <input class="input" name="category" placeholder="Category" required />
            <input class="input" name="images" placeholder="Image URLs (comma separated)" />
            <div style="display:flex; gap:12px;">
              <button class="button" type="submit" data-submit>Add product</button>
              <button class="button outline" type="button" data-admin-reset>Reset</button>
            </div>
            <p class="notice" data-admin-message></p>
          </form>
        </div>
        <div>
          <h3>Product list</h3>
          <div data-admin-list style="display:grid; gap:12px;"></div>
        </div>
      </div>
    </main>
    <script type="module" src="/js/admin-guard.js"></script>
    <script type="module" src="/js/admin.js"></script>
  </body>
</html>
